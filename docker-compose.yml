version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/RAG_Shabbir
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/RAG_Shabbir/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "debug"]